name: Deploy to Hugging Face Space

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Space
        uses: huggingface/hub-action@main   # ✅ use 'main' instead of 'v1'
        with:
          token: ${{ secrets.HF_TOKEN }}
          repo: Sanjjiiev/glassbox          # your Space name
          files: .                          # copy everything from repo root
          git_user: github-actions
          git_email: actions@github.com