name: Deploy to Hugging Face Space

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clone your Space repository using the token
          git clone https://Sanjjiiev:${HF_TOKEN}@huggingface.co/spaces/Sanjjiiev/glassbox space
          
          # Copy all files from the current repo to the Space folder,
          # excluding unnecessary folders
          rsync -av --exclude='.git' --exclude='venv' --exclude='node_modules' --exclude='.env' . space/
          
          # Commit and push if there are changes
          cd space
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Deploy from GitHub Actions (commit ${{ github.sha }})"
            git push
          else
            echo "No changes to commit."
          fi