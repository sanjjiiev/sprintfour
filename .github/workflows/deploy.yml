name: Deploy to Hugging Face Space

on:
  push:
    branches: [ main ]   # or your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Hugging Face Docker Registry
        uses: docker/login-action@v3
        with:
          registry: registry.hf.space
          username: ${{ secrets.HF_USERNAME || github.actor }}
          password: ${{ secrets.HF_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: registry.hf.space/${{ secrets.HF_SPACE_REPO || 'sanjjiiev/glassbox' }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Hugging Face Space to restart
        run: |
          curl -X POST "https://huggingface.co/api/spaces/${{ secrets.HF_SPACE_REPO || 'sanjjiiev/glassbox' }}/restart" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"